services:
  db:
    # Reviewed tag: mysql:8.0
    image: mysql:8.0@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    # Reviewed tag: wordpress:6.9-php8.2-apache
    image: wordpress:6.9-php8.2-apache@sha256:29a3af5db27d8c1716367575280bbf449cd231ced707daf8ce411895c042ed76
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - plugin_workspace:/var/www/html/wp-content/plugins/basicrum:ro

  wpcli:
    # Reviewed tag: wordpress:cli-2.12.0-php8.2
    image: wordpress:cli-2.12.0-php8.2@sha256:b93ed9324c515901534955dfb528b7e1de158827815d7bb699d774b6bb6df8aa
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WP_URL: http://wordpress
      WP_TITLE: Basicrum WooCommerce E2E
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: basicrum-e2e-password
      WP_ADMIN_EMAIL: admin@example.test
      HTTP_HOST: wordpress
    volumes:
      - wordpress_data:/var/www/html
      - plugin_workspace:/var/www/html/wp-content/plugins/basicrum:ro
      - ../tools:/tools:ro

  plugin:
    # Reviewed tag: composer:2
    image: composer:2@sha256:5946476338742b200bb9ff88f8be56275ddae4b3949c72305cb0dbf10cfcb760
    entrypoint: ["sh", "-c"]
    command:
      - >-
        rm -rf /workspace/vendor &&
        tar -C /source --exclude='./vendor' -cf - . | tar -C /workspace -xf -
    volumes:
      - ../plugins/basicrum:/source:ro
      - plugin_workspace:/workspace

  composer:
    # Reviewed tag: composer:2
    image: composer:2@sha256:5946476338742b200bb9ff88f8be56275ddae4b3949c72305cb0dbf10cfcb760
    working_dir: /workspace
    volumes:
      - plugin_workspace:/workspace

  javascript:
    # Reviewed tag: mcr.microsoft.com/playwright:v1.61.1-noble
    image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
    working_dir: /workspace
    environment:
      CI: "true"
      HOME: /tmp
      WOOCOMMERCE_E2E_BASE_URL: http://wordpress
    volumes:
      - ../:/workspace
    ipc: host

volumes:
  wordpress_data:
  plugin_workspace:
